<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUREUM | Elite Luxury Marketplace</title>
    
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        
        :root {
            --gold: #D4AF37;
            --border: rgba(212, 175, 55, 0.25);
            --glass: rgba(255, 255, 255, 0.03);
            --bg: #0A0A0A;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, #1a1608 0%, transparent 40%), 
                radial-gradient(circle at 100% 100%, #121212 0%, transparent 40%);
            background-attachment: fixed;
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        .gold-border { border: 1px solid var(--border); }
        .gold-text { color: var(--gold); }
        .gold-bg { background-color: var(--gold); }
        
        .glass {
            backdrop-filter: blur(16px);
            background: var(--glass);
            border: 1px solid var(--border);
        }

        .luxury-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .luxury-card:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.1);
        }

        .gold-shimmer {
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.2), transparent);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, orderBy, limit, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const config = {
            projectId: "gen-lang-client-0697100431",
            appId: "1:666026034496:web:01c3e6cae30b8192eee6a5",
            apiKey: "AIzaSyCkznYp78noawaRXATXBNlgP9p9eIGJR0k",
            authDomain: "gen-lang-client-0697100431.firebaseapp.com"
        };

        const app = initializeApp(config);
        window.DB = getFirestore(app, "ai-studio-e85ee056-bc45-445f-826b-e56a5e5a1067");
        window.AUTH = getAuth(app);
        window.FS = { collection, getDocs, orderBy, limit, query };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Navbar = () => (
            <header className="fixed top-0 w-full z-50 h-[70px] glass border-b border-[#D4AF37]/20 flex items-center justify-between px-8">
                <div className="flex items-center gap-2">
                    <span className="text-2xl font-black tracking-[4px] gold-text">AUREUM</span>
                </div>
                <div className="hidden md:flex flex-1 max-w-md mx-10 relative">
                    <input type="text" placeholder="Search registry..." className="w-full bg-white/5 border border-white/10 rounded-full px-10 py-2 text-sm focus:border-[#D4AF37]/50 outline-none transition" />
                    <i data-lucide="search" className="absolute left-3 top-2.5 w-4 h-4 opacity-40"></i>
                </div>
                <div className="flex items-center gap-4">
                    <button className="hidden sm:block text-[10px] font-black tracking-widest uppercase opacity-60 hover:opacity-100">Gallery</button>
                    <button className="bg-transparent border border-[#D4AF37] gold-text px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest hover:gold-bg hover:text-black transition active:scale-95">Login Access</button>
                </div>
            </header>
        );

        const Banner = () => (
            <section className="pt-40 pb-20 px-8 text-center relative overflow-hidden">
                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-[#D4AF37]/5 rounded-full blur-[120px] -z-10"></div>
                <h1 className="text-6xl md:text-8xl font-black tracking-tighter leading-none mb-8">
                    CURATING <br/> <span className="gold-text italic">PERFECTION.</span>
                </h1>
                <p className="max-w-xl mx-auto text-sm opacity-50 uppercase tracking-[3px] mb-12">The digital vault for verified heritage artifacts</p>
            </section>
        );

        const ItemCard = ({ item }) => (
            <div className="luxury-card glass rounded-[2rem] p-3">
                <div className="h-72 rounded-[1.5rem] overflow-hidden relative">
                    <img src={item.imageUrl || `https://picsum.photos/seed/${item.id}/600/600`} className="w-full h-full object-cover" alt={item.name} />
                    <div className="absolute bottom-4 left-4 bg-black/60 backdrop-blur-md px-4 py-1.5 rounded-full border border-white/10">
                        <span className="text-[10px] font-black gold-text uppercase tracking-widest">${item.price?.toLocaleString()}</span>
                    </div>
                </div>
                <div className="p-4">
                    <div className="text-[9px] font-black gold-text uppercase tracking-[2px] opacity-60 mb-1">{item.category}</div>
                    <h3 className="text-lg font-bold truncate">{item.name}</h3>
                    <button className="w-full mt-6 py-3 glass rounded-xl text-[10px] font-black uppercase tracking-widest hover:border-[#D4AF37] transition">Acquire Details</button>
                </div>
            </div>
        );

        const App = () => {
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const loadData = async () => {
                    if (window.FS) {
                        try {
                            const q = window.FS.query(window.FS.collection(window.DB, "items"), window.FS.orderBy("createdAt", "desc"), window.FS.limit(6));
                            const snap = await window.FS.getDocs(q);
                            setItems(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        } catch (e) { console.error(e); }
                        setLoading(false);
                    } else {
                        setTimeout(loadData, 500);
                    }
                };
                loadData();
                setTimeout(() => lucide.createIcons(), 1000);
            }, []);

            return (
                <div className="min-h-screen">
                    <Navbar />
                    <Banner />
                    
                    <main className="max-w-7xl mx-auto px-8 pb-40">
                        <div className="flex justify-between items-baseline mb-12 border-b border-white/5 pb-6">
                            <h2 className="text-2xl font-bold tracking-tight uppercase">Recent Acquisitions</h2>
                            <button className="text-[10px] font-black gold-text tracking-widest uppercase border-b border-[#D4AF37]">See Registry</button>
                        </div>

                        {loading ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {[1,2,3].map(i => <div key={i} className="h-96 glass rounded-[2rem] gold-shimmer opacity-20"></div>)}
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {items.map(item => <ItemCard key={item.id} item={item} />)}
                            </div>
                        )}
                    </main>

                    <footer className="glass py-20 px-8 border-t border-white/5">
                        <div className="text-center">
                            <div className="text-3xl font-black tracking-[8px] gold-text mb-4">AUREUM</div>
                            <p className="text-[10px] uppercase tracking-[4px] opacity-30">© 2026 Authenticated Heritage Protocol</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
