<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUREUM | Luxury Marketplace</title>
    
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        
        :root {
            --gold: #D4AF37;
            --border: rgba(212, 175, 55, 0.2);
            --bg: #0A0A0A;
            --glass: rgba(255, 255, 255, 0.03);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            overflow-x: hidden;
        }
        
        .gold-border { border: 1px solid var(--border); }
        
        .gold-text { color: var(--gold); }
        
        .glass {
            backdrop-filter: blur(12px);
            background: var(--glass);
            border: 1px solid var(--border);
        }
        
        /* Preview එකේ බටන් එකේ ස්ටයිල් එක */
        
        .btn-login {
            border: 1px solid var(--gold);
            color: white;
            background: transparent;
            padding: 10px 24px;
            border-radius: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 11px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }
        
        .btn-login:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
            transform: scale(1.02);
        }
        
        .btn-login:active { transform: scale(0.98); }
        
        .filter-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 6px 16px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .filter-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }
        
        /* Scrollbar styling */
        
        ::-webkit-scrollbar { width: 4px; }
        
        ::-webkit-scrollbar-track { background: transparent; }
        
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
  <script type="module" crossorigin src="/aureum/assets/index-DRdA6rbV.js"></script>
</head>
<body>
    <div id="root"></div>


    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = window.AUTH ? window.AUTH.onAuthStateChanged(setUser) : null;
                fetchItems();
                setTimeout(() => lucide.createIcons(), 500);
                return () => unsubscribe && unsubscribe();
            }, []);

            const fetchItems = async () => {
                if (!window.DB) return;
                try {
                    const q = window.FB.query(window.FB.collection(window.DB, "items"), window.FB.orderBy("createdAt", "desc"));
                    const snap = await window.FB.getDocs(q);
                    setItems(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                } catch (e) { console.error(e); }
                setLoading(false);
            };

            const handleLogin = async () => {
                try {
                    const provider = new window.FB.GoogleAuthProvider();
                    await window.FB.signInWithPopup(window.AUTH, provider);
                } catch (e) { alert("Login failed. Check browser pop-up settings."); }
            };

            return (
                <div className="flex flex-col min-h-screen">
                    {/* --- HEADER --- */}
                    <header className="h-[70px] border-b border-[#D4AF37]/20 glass sticky top-0 z-50 px-8 flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <span className="text-2xl font-black tracking-[4px] gold-text">AUREUM</span>
                        </div>
                        
                        <div className="hidden md:flex flex-1 max-w-xl mx-8 relative">
                            <i data-lucide="search" className="absolute left-4 top-2.5 w-4 h-4 gold-text opacity-50"></i>
                            <input 
                                type="text" 
                                placeholder="Search for luxury items, watches, tech..." 
                                className="w-full bg-white/5 border border-white/10 rounded-full py-2.5 pl-12 pr-4 text-sm focus:border-gold outline-none transition-all placeholder:opacity-30"
                            />
                        </div>

                        <div className="flex items-center gap-4">
                            {user ? (
                                <div className="flex items-center gap-4">
                                    <img src={user.photoURL} className="w-8 h-8 rounded-full border border-gold" />
                                    <button onClick={() => window.AUTH.signOut()} className="text-[10px] font-black uppercase opacity-60">Logout</button>
                                </div>
                            ) : (
                                <button onClick={handleLogin} className="btn-login">Login Access</button>
                            )}
                            <button className="w-10 h-10 glass rounded-xl flex items-center justify-center hover:border-gold/50 transition">
                                <i data-lucide="shield-alert" className="w-5 h-5 gold-text opacity-60"></i>
                            </button>
                        </div>
                    </header>

                    {/* --- MAIN CONTENT --- */}
                    <div className="flex flex-1 overflow-hidden">
                        
                        {/* --- LEFT SIDEBAR --- */}
                        <aside className="w-[240px] border-r border-[#D4AF37]/10 p-8 hidden lg:block sticky top-[70px] h-[calc(100vh-70px)] overflow-y-auto">
                            <h3 className="text-[10px] font-black uppercase tracking-[3px] gold-text opacity-40 mb-8">Collections</h3>
                            <nav className="flex flex-col gap-4">
                                <button className="text-left text-sm font-bold gold-text">All Collections</button>
                                <button className="text-left text-sm opacity-50 hover:opacity-100 transition">Heritage artifacts</button>
                                <button className="text-left text-sm opacity-50 hover:opacity-100 transition">Horology</button>
                                <button className="text-left text-sm opacity-50 hover:opacity-100 transition">Rare Tech</button>
                            </nav>
                        </aside>

                        {/* --- CENTER FEED --- */}
                        <main className="flex-1 p-10 overflow-y-auto">
                            <h1 className="text-3xl font-black tracking-tight mb-10">Latest Listings</h1>
                            
                            {loading ? (
                                <div className="flex flex-col items-center justify-center py-20 opacity-20">
                                    <div className="w-10 h-10 border-2 border-gold border-t-transparent rounded-full animate-spin"></div>
                                </div>
                            ) : items.length === 0 ? (
                                <div className="flex flex-col items-center justify-center py-32 glass rounded-[2.5rem] border-dashed border-white/10">
                                    <i data-lucide="shopping-bag" className="w-16 h-16 opacity-10 mb-6"></i>
                                    <h2 className="text-xl font-bold opacity-80">No items found</h2>
                                    <p className="text-sm opacity-40 mt-1">Try adjusting your filters or search query.</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-8">
                                    {items.map(item => (
                                        <div key={item.id} className="glass rounded-[2rem] p-3 hover:border-gold/50 transition duration-500">
                                            <div className="h-64 rounded-2xl overflow-hidden mb-4">
                                                <img src={item.imageUrl || `https://picsum.photos/seed/${item.id}/600/400`} className="w-full h-full object-cover" />
                                            </div>
                                            <div className="px-3 pb-3">
                                                <div className="text-[9px] font-black uppercase gold-text tracking-widest mb-1 opacity-50">{item.category}</div>
                                                <h3 className="font-bold truncate mb-4">{item.name}</h3>
                                                <div className="flex justify-between items-center bg-white/5 p-3 rounded-xl">
                                                    <span className="font-black text-sm text-gold">${item.price?.toLocaleString()}</span>
                                                    <button className="text-[10px] font-black uppercase tracking-widest border-b border-gold pb-0.5">Details</button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </main>

                        {/* --- RIGHT SIDEBAR --- */}
                        <aside className="w-[280px] border-l border-[#D4AF37]/10 p-8 hidden xl:block sticky top-[70px] h-[calc(100vh-70px)]">
                            <h3 className="text-[10px] font-black uppercase tracking-[3px] gold-text opacity-40 mb-6">Quick Filters</h3>
                            <div className="flex flex-wrap gap-2 mb-10">
                                <button className="filter-btn text-gold border-gold/40">Recently Added</button>
                                <button className="filter-btn">High End</button>
                                <button className="filter-btn">Auctions</button>
                            </div>

                            <h3 className="text-[10px] font-black uppercase tracking-[3px] gold-text opacity-40 mb-6">Market Hub</h3>
                            <div className="glass p-5 rounded-2xl border-white/5">
                                <p className="text-xs leading-relaxed opacity-60">
                                    Welcome to the elite marketplace. Authenticity and luxury at your fingertips.
                                </p>
                            </div>
                        </aside>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
